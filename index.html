<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Overlay</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="overlay-shell">
      <section class="scoreboard">
        <header class="scoreboard__header">
          <div>
            <p id="data-source" class="eyebrow">NBA LIVE FEED</p>
            <h1 id="match-title">Match Loading</h1>
          </div>
          <span id="live-pill" class="live-pill">PUSH</span>
        </header>

        <section class="teams">
          <article class="team-card">
            <div class="team-card__row team-card__row--top">
              <div>
                <p id="away-code" class="team-card__code">AWY</p>
                <h2 id="away-name">Away Team</h2>
              </div>
              <p id="away-score" class="team-card__score">0</p>
            </div>
            <p id="away-meta" class="team-card__meta">0-0</p>
          </article>

          <article class="team-card team-card--home">
            <div class="team-card__row team-card__row--top">
              <div>
                <p id="home-code" class="team-card__code">HME</p>
                <h2 id="home-name">Home Team</h2>
              </div>
              <p id="home-score" class="team-card__score">0</p>
            </div>
            <p id="home-meta" class="team-card__meta">0-0</p>
          </article>
        </section>

        <section class="match-strip">
          <div>
            <p class="match-strip__label">Arena</p>
            <p id="arena" class="match-strip__value">Arena unavailable</p>
          </div>
          <div>
            <p class="match-strip__label">Tip-off</p>
            <p id="tipoff" class="match-strip__value">Tip-off TBD</p>
          </div>
          <div>
            <p class="match-strip__label">Status</p>
            <p id="game-phase" class="match-strip__value">NBA</p>
          </div>
        </section>

        <footer class="scoreboard__footer">
          <div>
            <p id="game-status" class="status-line">Waiting for backend updates...</p>
            <p id="game-clock" class="clock-line">--:--</p>
          </div>
          <button id="cycle-match" type="button">Next Game</button>
        </footer>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
